services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: teacher
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: teacherdb
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=teacherdb
      - DB_POSTGRESDB_USER=teacher
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_HOST=127.0.0.1
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_EDITOR_BASE_URL=http://127.0.0.1:5678
      - WEBHOOK_URL=http://127.0.0.1:5678/
      - N8N_SECURE_COOKIE=false
      - N8N_DIAGNOSTICS_ENABLED=false
    depends_on:
      - postgres
    volumes:
      - n8ndata:/home/node/.n8n

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama

volumes:
  pgdata:
  n8ndata:
  ollamadata: