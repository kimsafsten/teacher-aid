<svg viewBox="0 0 860 560" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ER Diagram – TeacherAid Data Model</title>

  <defs>
    <marker id="fk" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#888"/>
    </marker>
  </defs>

  <rect width="860" height="560" fill="#1a1a2e" rx="12"/>
  <text x="430" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">ER Diagram – TeacherAid Data Model</text>

  <!-- Submission -->
  <rect x="30" y="50" width="195" height="175" rx="8" fill="#0d1f3c" stroke="#4a7cf7" stroke-width="2"/>
  <rect x="30" y="50" width="195" height="30" rx="8" fill="#4a7cf7"/>
  <rect x="30" y="68" width="195" height="12" fill="#4a7cf7"/>
  <text x="127" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff">Submission</text>
  <line x1="30" y1="80" x2="225" y2="80" stroke="#4a7cf7" stroke-width="1"/>
  <text x="40" y="97"  font-family="system-ui,sans-serif" font-size="10" fill="#aac4ff">Id: int PK</text>
  <text x="40" y="113" font-family="system-ui,sans-serif" font-size="10" fill="#ccd9ff">StudentName: string</text>
  <text x="40" y="129" font-family="system-ui,sans-serif" font-size="10" fill="#ccd9ff">CourseId: string</text>
  <text x="40" y="145" font-family="system-ui,sans-serif" font-size="10" fill="#ccd9ff">AssignmentId: string</text>
  <text x="40" y="161" font-family="system-ui,sans-serif" font-size="10" fill="#ccd9ff">Content: string</text>
  <text x="40" y="177" font-family="system-ui,sans-serif" font-size="10" fill="#ccd9ff">SourceFileName: string?</text>
  <text x="40" y="193" font-family="system-ui,sans-serif" font-size="10" fill="#ccd9ff">SubmittedAt: DateTime</text>
  <text x="40" y="209" font-family="system-ui,sans-serif" font-size="10" fill="#ccd9ff">FeedbackDraft: nav 0..1</text>

  <!-- FeedbackDraft -->
  <rect x="30" y="255" width="195" height="195" rx="8" fill="#0d1f3c" stroke="#e67e22" stroke-width="2"/>
  <rect x="30" y="255" width="195" height="30" rx="8" fill="#e67e22"/>
  <rect x="30" y="273" width="195" height="12" fill="#e67e22"/>
  <text x="127" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff">FeedbackDraft</text>
  <line x1="30" y1="285" x2="225" y2="285" stroke="#e67e22" stroke-width="1"/>
  <text x="40" y="302" font-family="system-ui,sans-serif" font-size="10" fill="#ffe0b2">Id: int PK</text>
  <text x="40" y="318" font-family="system-ui,sans-serif" font-size="10" fill="#ffe0b2">SubmissionId: int FK</text>
  <text x="40" y="334" font-family="system-ui,sans-serif" font-size="10" fill="#ffd0a0">Summary: string</text>
  <text x="40" y="350" font-family="system-ui,sans-serif" font-size="10" fill="#ffd0a0">AiFeedback: string</text>
  <text x="40" y="366" font-family="system-ui,sans-serif" font-size="10" fill="#ffd0a0">TeacherFeedback: string?</text>
  <text x="40" y="382" font-family="system-ui,sans-serif" font-size="10" fill="#ffd0a0">TeacherGrade: string?</text>
  <text x="40" y="398" font-family="system-ui,sans-serif" font-size="10" fill="#ffd0a0">Approved: bool</text>
  <text x="40" y="414" font-family="system-ui,sans-serif" font-size="10" fill="#ffd0a0">CreatedAt: DateTime</text>

  <!-- AutomationLog -->
  <rect x="300" y="50" width="195" height="160" rx="8" fill="#0d1f3c" stroke="#9b59b6" stroke-width="2"/>
  <rect x="300" y="50" width="195" height="30" rx="8" fill="#9b59b6"/>
  <rect x="300" y="68" width="195" height="12" fill="#9b59b6"/>
  <text x="397" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff">AutomationLog</text>
  <line x1="300" y1="80" x2="495" y2="80" stroke="#9b59b6" stroke-width="1"/>
  <text x="310" y="97"  font-family="system-ui,sans-serif" font-size="10" fill="#d7b4f7">Id: int PK</text>
  <text x="310" y="113" font-family="system-ui,sans-serif" font-size="10" fill="#d7b4f7">SubmissionId: int FK</text>
  <text x="310" y="129" font-family="system-ui,sans-serif" font-size="10" fill="#e8d5ff">Timestamp: DateTime</text>
  <text x="310" y="145" font-family="system-ui,sans-serif" font-size="10" fill="#e8d5ff">Status: string</text>
  <text x="310" y="161" font-family="system-ui,sans-serif" font-size="10" fill="#e8d5ff">TokensUsed: int?</text>
  <text x="310" y="177" font-family="system-ui,sans-serif" font-size="10" fill="#e8d5ff">ErrorMessage: string?</text>

  <!-- CourseDocument -->
  <rect x="560" y="50" width="220" height="210" rx="8" fill="#0d1f3c" stroke="#27ae60" stroke-width="2"/>
  <rect x="560" y="50" width="220" height="30" rx="8" fill="#27ae60"/>
  <rect x="560" y="68" width="220" height="12" fill="#27ae60"/>
  <text x="670" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff">CourseDocument</text>
  <line x1="560" y1="80" x2="780" y2="80" stroke="#27ae60" stroke-width="1"/>
  <text x="570" y="97"  font-family="system-ui,sans-serif" font-size="10" fill="#aaffcc">Id: int PK</text>
  <text x="570" y="113" font-family="system-ui,sans-serif" font-size="10" fill="#ccffe8">CourseId: string</text>
  <text x="570" y="129" font-family="system-ui,sans-serif" font-size="10" fill="#ccffe8">AssignmentId: string</text>
  <text x="570" y="145" font-family="system-ui,sans-serif" font-size="10" fill="#ccffe8">DocumentType: enum</text>
  <text x="570" y="161" font-family="system-ui,sans-serif" font-size="10" fill="#ccffe8">FileName: string</text>
  <text x="570" y="177" font-family="system-ui,sans-serif" font-size="10" fill="#ccffe8">Content: string</text>
  <text x="570" y="193" font-family="system-ui,sans-serif" font-size="10" fill="#ccffe8">SourceFileName: string?</text>
  <text x="570" y="209" font-family="system-ui,sans-serif" font-size="10" fill="#ccffe8">UploadedAt: DateTime</text>
  <text x="570" y="225" font-family="system-ui,sans-serif" font-size="10" fill="#ccffe8">Chunks: List nav</text>
  <text x="570" y="241" font-family="system-ui,sans-serif" font-size="9" fill="#88ccaa">CourseMaterial | AssignmentDescription | GradingRubric</text>

  <!-- DocumentChunk -->
  <rect x="560" y="290" width="220" height="165" rx="8" fill="#0d1f3c" stroke="#1abc9c" stroke-width="2"/>
  <rect x="560" y="290" width="220" height="30" rx="8" fill="#1abc9c"/>
  <rect x="560" y="308" width="220" height="12" fill="#1abc9c"/>
  <text x="670" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff">DocumentChunk</text>
  <line x1="560" y1="320" x2="780" y2="320" stroke="#1abc9c" stroke-width="1"/>
  <text x="570" y="337" font-family="system-ui,sans-serif" font-size="10" fill="#a0fff0">Id: int PK</text>
  <text x="570" y="353" font-family="system-ui,sans-serif" font-size="10" fill="#a0fff0">CourseDocumentId: int FK</text>
  <text x="570" y="369" font-family="system-ui,sans-serif" font-size="10" fill="#c0fff8">CourseId: string</text>
  <text x="570" y="385" font-family="system-ui,sans-serif" font-size="10" fill="#c0fff8">AssignmentId: string</text>
  <text x="570" y="401" font-family="system-ui,sans-serif" font-size="10" fill="#c0fff8">Text: string</text>
  <text x="570" y="417" font-family="system-ui,sans-serif" font-size="10" fill="#c0fff8">Embedding: vector(768)?</text>

  <!-- Relations -->
  <line x1="127" y1="225" x2="127" y2="255" stroke="#888" stroke-width="1.5" marker-end="url(#fk)"/>
  <text x="132" y="243" font-family="system-ui,sans-serif" font-size="9" fill="#aaa">1 : 0..1</text>

  <line x1="225" y1="120" x2="300" y2="120" stroke="#888" stroke-width="1.5" marker-end="url(#fk)"/>
  <text x="235" y="115" font-family="system-ui,sans-serif" font-size="9" fill="#aaa">1</text>
  <text x="288" y="115" font-family="system-ui,sans-serif" font-size="9" fill="#aaa">*</text>

  <line x1="670" y1="260" x2="670" y2="290" stroke="#888" stroke-width="1.5" marker-end="url(#fk)"/>
  <text x="675" y="278" font-family="system-ui,sans-serif" font-size="9" fill="#aaa">1 : *</text>

  <text x="300" y="530" font-family="system-ui,sans-serif" font-size="9" fill="#888">PK = Primary Key   FK = Foreign Key   nav = navigation property</text>
</svg>
